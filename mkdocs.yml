---
# MkDocs configuration for czi-pyramidizer
# Requires: pip install mkdocs mkdocs-material pymdown-extensions

site_name: CZI Pyramidizer
site_description: CLI tool to generate CZI pyramids
site_url: https://zeiss.github.io/czi-pyramidizer/
repo_url: https://github.com/ZEISS/czi-pyramidizer
repo_name: ZEISS/czi-pyramidizer

# Where Markdown files live and where the static site is output
docs_dir: docs
site_dir: site

# Theme (Material)
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.expand
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - attr_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

# Navigation
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
      - CLI: usage/cli.md
      - Examples: usage/examples.md
  - Releasing:
      - Release Policy: releasing.md
      - Static LGPL Relinking: release-lgpl-relinking.md
