---
name: Build Package Alpine Linux x64

# Shared workflow for building, testing, and packaging the Alpine Linux x64
# variant of czi-pyramidizer. CI and release workflows call this file so the
# packaging logic lives in one place without producing skipped jobs.

'on':
  workflow_call:
    inputs:
      release_tag:
        description: Optional release tag used for packaged archive names
        required: false
        default: ""
        type: string
      package_archive:
        description: Package the artifact directory into a release archive
        required: false
        default: false
        type: boolean
      upload_name:
        description: Optional upload-artifact name override
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  ARCHITECTURE: x64
  OPENCV_VERSION: 4.10.0

jobs:
  build-package:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            bash \
            cmake \
            tar \
            make \
            g++ \
            ninja \
            git \
            build-base \
            python3-dev \
            linux-headers

      - name: Cache OpenCV install
        uses: actions/cache@v5
        with:
          path: opencv-install
          key: alpine-opencv-4.10.0-static-core

      - name: Build azure-sdk-for-cpp
        run: |
          apk add --no-cache perl gcompat zip unzip curl
          mkdir vcpkg
          cd vcpkg
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          echo "VCPKG_ROOT=$(pwd)" >> "$GITHUB_ENV"
          VCPKGTOOLCHAINFILE="$(pwd)/scripts/buildsystems/vcpkg.cmake"
          ./bootstrap-vcpkg.sh
          ./vcpkg install azure-storage-blobs-cpp azure-identity-cpp
          echo "VCPKGTOOLCHAINFILE=$VCPKGTOOLCHAINFILE" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          apk add --no-cache openssl-dev
          if [ ! -f \
            "${GITHUB_WORKSPACE}/opencv-install/lib/cmake/opencv4/OpenCVConfig.cmake" ]; then
            mkdir opencvbuild
            cd opencvbuild
            git clone --branch "${OPENCV_VERSION}" --depth 1 https://github.com/opencv/opencv.git
            git clone --branch "${OPENCV_VERSION}" --depth 1 \
              https://github.com/opencv/opencv_contrib.git
            mkdir opencv/build && cd opencv/build
            cmake -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/opencv-install" \
              -DBUILD_SHARED_LIBS=OFF \
              -DOPENCV_EXTRA_MODULES_PATH=../../opencv_contrib/modules \
              -DBUILD_opencv_apps=OFF \
              -DBUILD_TESTS=OFF \
              -DBUILD_PERF_TESTS=OFF \
              -DBUILD_DOCS=OFF \
              ..
            ninja
            ninja install
          fi
          echo "OPENCV_DIR=${GITHUB_WORKSPACE}/opencv-install/lib/cmake/opencv4" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DOpenCV_DIR="${OPENCV_DIR}" \
            -DLIBCZI_BUILD_CURL_BASED_STREAM=ON \
            -DLIBCZI_BUILD_AZURESDK_BASED_STREAM=ON \
            -DLIBCZI_BUILD_PREFER_EXTERNALPACKAGE_LIBCURL=OFF \
            -DCMAKE_C_FLAGS="-static-libgcc" \
            -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKGTOOLCHAINFILE}" \
            ..

      - name: Build
        run: |
          cd build
          cmake --build . --config "${BUILD_TYPE}" -j "$(nproc)"

      - name: Run Unit-Tests
        run: |
          cd build
          ctest -C "${BUILD_TYPE}"

      - name: Prepare artifact contents
        run: |
          mkdir -p artifact dist
          # Release jobs pass an explicit tag so the package names line up with
          # the GitHub Release assets. CI jobs fall back to the current commit
          # SHA because checkout in the Alpine container may use an archive
          # download instead of a local .git repository.
          version="${{ inputs.release_tag }}"
          if [ -z "$version" ]; then
            version="$(printf '%.7s' "$GITHUB_SHA")"
          fi
          architecture_lower="$(printf '%s' "$ARCHITECTURE" | tr '[:upper:]' '[:lower:]')"
          name="czi-pyramidizer-alpine-linux-${architecture_lower}-${version}"
          mkdir "artifact/${name}"
          cp build/czi-pyramidizer/czi-pyramidizer "artifact/${name}/"
          cp LICENSE THIRD_PARTY_LICENSES.txt README.release.md "artifact/${name}/"
          echo "artifactName=${name}" >> "$GITHUB_ENV"
          echo "artifactPath=${{ github.workspace }}/artifact/${name}" >> "$GITHUB_ENV"

      - name: Collect dependency versions for SBOM
        run: |
          vcpkg_version() {
            # Use the bootstrapped vcpkg instance from this container so the
            # SBOM records the actual Azure/curl/OpenSSL package versions that
            # were installed for this Alpine build. Match only the package
            # namespec column so package descriptions cannot be mistaken for
            # versions.
            "${VCPKG_ROOT}/vcpkg" list "$1" |
              awk -v package="$1" '
                $1 ~ "^" package "(\\[[^]]+\\])?:x64-linux$" {
                  print $2
                  found = 1
                  exit
                }
                END {
                  if (!found) {
                    exit 1
                  }
                }'
          }

          azure_storage_version="$(vcpkg_version azure-storage-blobs-cpp)"
          azure_identity_version="$(vcpkg_version azure-identity-cpp)"

          # Export the observed package versions for the SPDX generator. The
          # OpenCV version comes from the pinned workflow input, while curl and
          # OpenSSL are taken from the vcpkg dependency set we just installed.
          {
            echo "SBOM_OPENCV_VERSION=${OPENCV_VERSION}"
            echo "SBOM_AZURE_SDK_VERSION=azure-storage-blobs-cpp=${azure_storage_version}; azure-identity-cpp=${azure_identity_version}"
            echo "SBOM_CURL_VERSION=$(vcpkg_version curl)"
            echo "SBOM_OPENSSL_VERSION=$(vcpkg_version openssl)"
          } >> "$GITHUB_ENV"

      - name: Generate SPDX SBOM
        run: |
          python3 release/generate-spdx-sbom.py \
            --metadata release/sbom-components.json \
            --artifact-dir "artifact/${artifactName}" \
            --artifact-name "${artifactName}" \
            --platform "alpine-linux-x64" \
            --component-version "OpenCV=${SBOM_OPENCV_VERSION}" \
            --component-version "Azure SDK for C++=${SBOM_AZURE_SDK_VERSION}" \
            --component-version "curl=${SBOM_CURL_VERSION}" \
            --component-version "OpenSSL=${SBOM_OPENSSL_VERSION}" \
            --output "artifact/${artifactName}/${artifactName}.spdx.json"

      - name: Generate SHA-256 checksums
        run: |
          cd "artifact/${artifactName}"
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Archive release package
        if: ${{ inputs.package_archive }}
        run: |
          # Linux release assets are published as tar.gz archives to preserve
          # executable bits and align with common Unix packaging expectations.
          tar -C artifact -czf "dist/${artifactName}.tar.gz" "${artifactName}"
          echo "uploadPath=${{ github.workspace }}/dist/${artifactName}.tar.gz" >> "$GITHUB_ENV"

      - name: Set artifact upload path
        if: ${{ !inputs.package_archive }}
        run: |
          echo "uploadPath=${artifactPath}" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.upload_name != '' && inputs.upload_name || env.artifactName }}
          path: ${{ env.uploadPath }}
