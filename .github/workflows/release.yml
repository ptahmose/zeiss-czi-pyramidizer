---
name: Release

# Orchestrates a full GitHub Release from a tag (or a manual dry run). The
# per-platform build logic lives in the platform-specific reusable workflows;
# this workflow only coordinates the platform jobs, assembles the final release
# assets, and publishes the GitHub Release entry.

'on':
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  RELEASE_TAG: >-
    ${{
      github.event_name == 'workflow_dispatch'
      && inputs.release_tag
      || github.ref_name
    }}

jobs:
  windows-x64:
    uses: ./.github/workflows/build-package-windows-x64.yml
    with:
      release_tag: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && inputs.release_tag
          || github.ref_name
        }}
      package_archive: true
      upload_name: release-windows-x64

  windows-arm64:
    uses: ./.github/workflows/build-package-windows-arm64.yml
    with:
      release_tag: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && inputs.release_tag
          || github.ref_name
        }}
      package_archive: true
      upload_name: release-windows-arm64

  linux-x64:
    uses: ./.github/workflows/build-package-linux-x64.yml
    with:
      release_tag: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && inputs.release_tag
          || github.ref_name
        }}
      package_archive: true
      upload_name: release-linux-x64

  alpine-linux-x64:
    uses: ./.github/workflows/build-package-alpine-linux-x64.yml
    with:
      release_tag: >-
        ${{
          github.event_name == 'workflow_dispatch'
          && inputs.release_tag
          || github.ref_name
        }}
      package_archive: true
      upload_name: release-alpine-linux-x64

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - windows-arm64
      - linux-x64
      - alpine-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release packages
        uses: actions/download-artifact@v7
        with:
          # Each platform job uploads exactly one archive with a stable name.
          pattern: release-*
          path: release-dist
          merge-multiple: true

      - name: Generate archive checksums
        shell: bash
        run: |
          # This checksum file covers the published archives themselves. Each
          # archive also contains its own internal SHA256SUMS file.
          cd release-dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Prepare release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## Release Assets

          This release provides binary packages for:

          - Windows x64
          - Windows ARM64
          - Linux x64
          - Alpine Linux x64

          Each package contains the executable together with:

          - \`LICENSE\`
          - \`THIRD_PARTY_LICENSES.txt\`
          - \`README.release.md\`
          - a package-local SPDX JSON SBOM
          - a package-local \`SHA256SUMS\`

          The release also includes a top-level \`SHA256SUMS\` file for the
          published archive assets.

          ## Compliance Notes

          \`czi-pyramidizer\` may statically link \`libCZI\`. See the project
          documentation for release and relinking guidance:

          - docs/releasing.md
          - docs/release-lgpl-relinking.md
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          PRERELEASE: >-
            ${{
              github.event_name == 'workflow_dispatch'
              && inputs.prerelease
              || 'false'
            }}
        shell: bash
        run: |
          # Allow repeated dry runs: if the release already exists, replace the
          # assets and update the notes instead of failing.
          create_draft_flag=""
          create_prerelease_flag=""
          edit_draft_flag="--draft=false"
          edit_prerelease_flag="--prerelease=false"
          if [ "$DRAFT" = "true" ]; then
            create_draft_flag="--draft"
            edit_draft_flag="--draft=true"
          fi
          if [ "$PRERELEASE" = "true" ]; then
            create_prerelease_flag="--prerelease"
            edit_prerelease_flag="--prerelease=true"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-dist/* --clobber
            gh release edit "$RELEASE_TAG" \
              --notes-file release-notes.md \
              $edit_draft_flag \
              $edit_prerelease_flag
          else
            gh release create "$RELEASE_TAG" release-dist/* \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --notes-file release-notes.md \
              $create_draft_flag \
              $create_prerelease_flag
          fi
